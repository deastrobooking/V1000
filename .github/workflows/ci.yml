name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # eframe/winit need system libraries on Linux; FFmpeg lands with M1.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  ffmpeg:
    name: decode path (--features ffmpeg)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # FFmpeg dev libs + libclang (bindgen) for the ffmpeg-the-third build,
      # plus the GUI/windowing libs the workspace links.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config clang libclang-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            libavfilter-dev libavdevice-dev \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Clippy (ffmpeg)
        run: cargo clippy --workspace --all-targets --features v1000-app/ffmpeg -- -D warnings

      - name: Test (ffmpeg)
        run: cargo test --workspace --features v1000-app/ffmpeg
